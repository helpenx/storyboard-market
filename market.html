<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpenx 分镜市场 · 元件购物原型</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f7f9fc;
            color: #1a2634;
        }

        /* 品牌色 */
        :root {
            --primary: #1f2b3c;
            --accent: #f4a261;
            --accent-dark: #e76f51;
            --gray-light: #f1f5f9;
            --border: #e2e8f0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f2b3c, #3f5a7c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            background: var(--gray-light);
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-count {
            background: var(--accent);
            color: #1f2b3c;
            border-radius: 30px;
            padding: 2px 8px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* 筛选栏 */
        .filters {
            display: flex;
            gap: 12px;
            margin: 32px 0 24px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: white;
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* 商品网格 */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
            margin: 32px 0 80px;
        }

        .product-card {
            background: white;
            border-radius: 28px;
            border: 1px solid var(--border);
            padding: 20px;
            transition: 0.2s;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.15);
        }

        .product-icon {
            font-size: 2.8rem;
            margin-bottom: 12px;
        }

        .product-title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .product-type {
            font-size: 0.7rem;
            color: #687e8c;
            text-transform: uppercase;
            margin: 8px 0;
        }

        .product-desc {
            color: #475569;
            font-size: 0.85rem;
            margin: 12px 0;
            line-height: 1.4;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
        }

        .price {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--primary);
        }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .add-btn:hover {
            background: var(--accent-dark);
        }

        /* 购物车侧边栏 */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -450px;
            width: 420px;
            max-width: 90vw;
            height: 100vh;
            background: white;
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 12px;
        }

        .item-info h4 {
            font-size: 1rem;
        }

        .item-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .item-actions button {
            background: #f1f5f9;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .cart-total {
            font-weight: 800;
            font-size: 1.3rem;
            border-top: 2px solid var(--border);
            padding-top: 16px;
        }

        .checkout-btn {
            background: var(--accent);
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 999;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        /* 支付弹窗 */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            z-index: 1100;
            width: 400px;
            max-width: 90vw;
            border-radius: 32px;
            padding: 32px;
            display: none;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.2);
        }

        .modal.open {
            display: flex;
        }

        .modal input {
            padding: 14px;
            border-radius: 60px;
            border: 1px solid var(--border);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <div class="logo">helpenx <span style="font-size:0.9rem;">🎬 分镜元件市场</span></div>
            <div class="cart-icon" id="cartIcon">
                🛒 购物车 <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="filters" id="filterContainer">
            <button class="filter-btn active" data-type="all">全部</button>
            <button class="filter-btn" data-type="emotion">情绪镜头</button>
            <button class="filter-btn" data-type="dialogue">镜头组</button>
            <button class="filter-btn" data-type="style">风格预设</button>
            <button class="filter-btn" data-type="transition">转场元件</button>
        </div>

        <div class="market-grid" id="productGrid"></div>
    </div>

    <!-- 购物车侧边栏 -->
    <div class="overlay" id="overlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            我的购物车
            <button class="close-cart" id="closeCartBtn">✕</button>
        </div>
        <div class="cart-items" id="cartItemsList"></div>
        <div class="cart-total" id="cartTotal">总计: $0.00</div>
        <button class="checkout-btn" id="checkoutBtn">去结算 →</button>
    </div>

    <!-- 支付弹窗 -->
    <div class="modal" id="paymentModal">
        <h3>💳 测试支付 (模拟)</h3>
        <input type="text" placeholder="卡号 4242 4242 4242 4242" value="4242 4242 4242 4242">
        <input type="text" placeholder="MM/YY">
        <input type="text" placeholder="CVC">
        <button id="confirmPayBtn" style="background:#1f2b3c; color:white; padding:12px; border-radius:40px;">确认支付
            $0.00</button>
        <button id="closeModalBtn" style="background:#eee;">取消</button>
    </div>

    <script>
        // ---------- 商品数据（元件）----------
        const products = [
            { id: 1, name: "「失落」情绪镜头组", type: "emotion", desc: "背影虚化+雨窗特写+转身", price: 1.2, icon: "🎭🌧️" },
            { id: 2, name: "S-Dual 对话框架", type: "dialogue", desc: "中景-反打-过肩，变量槽x4", price: 2.8, icon: "🗣️📄" },
            { id: 3, name: "「霓虹低语」风格包", type: "style", desc: "赛博朋克+霓虹色调+抽帧", price: 3.5, icon: "🎞️🌃" },
            { id: 4, name: "「裂隙」穿越转场", type: "transition", desc: "粒子消散→新场景", price: 0.9, icon: "🌀⏳" },
            { id: 5, name: "「狂喜」情绪爆发", type: "emotion", desc: "升格慢镜+光晕+大笑", price: 1.4, icon: "🤩✨" },
            { id: 6, name: "动作追击·3镜头组", type: "dialogue", desc: "奔跑→障碍→跃过", price: 2.2, icon: "🏃💨" },
            { id: 7, name: "复古胶片预设", type: "style", desc: "颗粒+褪色+暖调", price: 2.0, icon: "📽️🍂" },
            { id: 8, name: "时空闪回转场", type: "transition", desc: "波纹干扰+老电视效果", price: 1.1, icon: "📺✨" }
        ];

        let cart = []; // { id, name, price, quantity }

        // 渲染商品列表 (支持筛选)
        let currentFilter = "all";
        function renderProducts() {
            const filtered = currentFilter === "all" ? products : products.filter(p => p.type === currentFilter);
            const grid = document.getElementById("productGrid");
            grid.innerHTML = filtered.map(p => `
            <div class="product-card">
                <div class="product-icon">${p.icon}</div>
                <div class="product-title">${p.name}</div>
                <div class="product-type">${p.type === 'emotion' ? '情绪镜头' : p.type === 'dialogue' ? '镜头组' : p.type === 'style' ? '风格预设' : '转场元件'}</div>
                <div class="product-desc">${p.desc}</div>
                <div class="price-row">
                    <span class="price">$${p.price.toFixed(2)}</span>
                    <button class="add-btn" data-id="${p.id}">+ 加入购物车</button>
                </div>
            </div>
        `).join("");
            // 绑定加入购物车事件
            document.querySelectorAll(".add-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = parseInt(btn.dataset.id);
                    addToCart(id);
                });
            });
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartUI();
        }

        function updateCartUI() {
            // 更新角标
            const totalItems = cart.reduce((sum, i) => sum + i.quantity, 0);
            document.getElementById("cartCount").innerText = totalItems;
            // 更新侧边栏列表
            const cartContainer = document.getElementById("cartItemsList");
            if (!cartContainer) return;
            if (cart.length === 0) {
                cartContainer.innerHTML = "<div style='color:gray;text-align:center;'>购物车是空的，去挑选一些分镜元件吧✨</div>";
            } else {
                cartContainer.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="item-info">
                        <h4>${item.name}</h4>
                        <small>$${item.price.toFixed(2)} × ${item.quantity}</small>
                    </div>
                    <div class="item-actions">
                        <button class="cart-qty-minus" data-id="${item.id}">-</button>
                        <span>${item.quantity}</span>
                        <button class="cart-qty-plus" data-id="${item.id}">+</button>
                        <button class="cart-remove" data-id="${item.id}" style="background:#fee2e2;">🗑️</button>
                    </div>
                </div>
            `).join("");
            }
            // 绑定购物车内增减删除
            document.querySelectorAll(".cart-qty-minus").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = parseInt(btn.dataset.id);
                    const item = cart.find(i => i.id === id);
                    if (item && item.quantity > 1) {
                        item.quantity -= 1;
                    } else if (item && item.quantity === 1) {
                        cart = cart.filter(i => i.id !== id);
                    }
                    updateCartUI();
                });
            });
            document.querySelectorAll(".cart-qty-plus").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = parseInt(btn.dataset.id);
                    const item = cart.find(i => i.id === id);
                    if (item) item.quantity += 1;
                    updateCartUI();
                });
            });
            document.querySelectorAll(".cart-remove").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = parseInt(btn.dataset.id);
                    cart = cart.filter(i => i.id !== id);
                    updateCartUI();
                });
            });
            // 更新总计
            const total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            document.getElementById("cartTotal").innerHTML = `总计: $${total.toFixed(2)}`;
            const payBtn = document.getElementById("confirmPayBtn");
            if (payBtn) payBtn.innerText = `确认支付 $${total.toFixed(2)}`;
        }

        // 侧边栏开关
        const cartIcon = document.getElementById("cartIcon");
        const cartSidebar = document.getElementById("cartSidebar");
        const overlay = document.getElementById("overlay");
        const closeCartBtn = document.getElementById("closeCartBtn");
        function openCart() { cartSidebar.classList.add("open"); overlay.classList.add("show"); }
        function closeCart() { cartSidebar.classList.remove("open"); overlay.classList.remove("show"); }
        cartIcon.addEventListener("click", openCart);
        closeCartBtn.addEventListener("click", closeCart);
        overlay.addEventListener("click", closeCart);

        // 筛选逻辑
        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentFilter = btn.dataset.type;
                renderProducts();
            });
        });

        // 结算弹窗
        const checkoutBtn = document.getElementById("checkoutBtn");
        const paymentModal = document.getElementById("paymentModal");
        const confirmPayBtn = document.getElementById("confirmPayBtn");
        const closeModalBtn = document.getElementById("closeModalBtn");
        checkoutBtn.addEventListener("click", () => {
            if (cart.length === 0) { alert("购物车还是空的，先添加元件吧～"); return; }
            paymentModal.classList.add("open");
        });
        function closeModal() { paymentModal.classList.remove("open"); }
        closeModalBtn.addEventListener("click", closeModal);
        confirmPayBtn.addEventListener("click", () => {
            alert("🎉 演示模式：订单已提交！Helpenx 将立即为您开通元件授权并接入AI装配流程。");
            cart = [];
            updateCartUI();
            closeModal();
            closeCart();
            alert("感谢购买，您的元件会自动同步到 Helpenx Studio 工作台。");
        });

        // 初始化
        renderProducts();
        updateCartUI();
    </script>
</body>

</html>
